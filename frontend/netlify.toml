[build]
  command   = "npm run build"
  publish   = "dist"

# Proxy all /api calls to Render backend — avoids CORS issues
[[redirects]]
  from   = "/api/*"
  to     = "https://nkherbal-crm-backend.onrender.com/api/:splat"
  status = 200
  force  = true

# SPA fallback — all routes go to index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
